<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>캠퍼스 보드 — 대학 통합 대시보드</title>
<meta name="description" content="대학생이 소속 단위로 쓰는 개인화 위젯 대시보드 — 시간표·투표 인터랙티브 데모" />
<!-- GitHub Pages 정적 배포 엔트리. 빌드 불필요(React/Tailwind CDN). -->
<!-- 시간표·투표는 인터랙티브 + localStorage 저장. src/ 의 TSX 와 동일 로직. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:Pretendard,'Apple SD Gothic Neo',-apple-system,sans-serif}</style>
</head>
<body class="bg-[#EBEEF3]">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;
const LS = { get:(k,f)=>{try{const v=localStorage.getItem('campus.'+k);return v?JSON.parse(v):f}catch{return f}}, set:(k,v)=>{try{localStorage.setItem('campus.'+k,JSON.stringify(v))}catch{}} };
// 정적 데이터 fetch 훅: ./data/*.json 을 읽되, 실패(file:// 등) 시 fallback 사용
function useJson(url, fallback){
  const [data,setData]=useState(fallback);
  useEffect(()=>{ let on=true;
    fetch(url).then(r=>r.ok?r.json():Promise.reject()).then(d=>{if(on)setData(d);}).catch(()=>{});
    return ()=>{on=false;};
  },[url]);
  return data;
}

const Widget = ({title,dot="indigo",right,children,className=""}) => {
  const dots={indigo:"bg-indigo-600",green:"bg-green-600",red:"bg-red-500",amber:"bg-amber-500",slate:"bg-slate-400"};
  return (
   <section className={"rounded-2xl bg-white border border-gray-200 shadow-sm p-5 "+className}>
    <header className="flex items-center justify-between mb-3">
      <div className="flex items-center gap-2"><span className={"w-2 h-2 rounded-full "+dots[dot]}/><h3 className="text-sm font-semibold text-gray-800">{title}</h3></div>
      {right}
    </header>{children}
   </section>
  );
};

/* ===== 시간표 (인터랙티브) ===== */
const DAYS=["월","화","수","목","금"], H0=9, H1=18;
const TONE={indigo:["bg-indigo-50","text-indigo-600","ring-indigo-200"],red:["bg-red-50","text-red-500","ring-red-200"],green:["bg-green-50","text-green-600","ring-green-200"],amber:["bg-amber-50","text-amber-600","ring-amber-200"]};
const SEED_TT=[
 {id:"c1",subject:"알고리즘",room:"IT4-301",day:0,start:9,end:11,color:"indigo"},
 {id:"c2",subject:"운영체제",room:"공대 211",day:2,start:9,end:10,color:"red"},
 {id:"c3",subject:"소프트웨어공학",room:"IT1-103",day:1,start:11,end:12,color:"amber"},
 {id:"c4",subject:"DB설계",room:"IT2-205",day:3,start:11,end:13,color:"green"},
 {id:"c5",subject:"캡스톤디자인",room:"IT4-401",day:4,start:9,end:10,color:"indigo"},
];
function Timetable(){
  const [cs,setCs]=useState(()=>LS.get('timetable',SEED_TT));
  const [edit,setEdit]=useState(null);
  const persist=(n)=>{setCs(n);LS.set('timetable',n);};
  const rows=H1-H0;
  const save=()=>{const b=edit.block; if(!b.subject.trim()||b.end<=b.start)return; persist(edit.isNew?[...cs,{...b,id:'c'+Date.now()}]:cs.map(c=>c.id===b.id?b:c)); setEdit(null);};
  const del=()=>{persist(cs.filter(c=>c.id!==edit.block.id));setEdit(null);};
  return (
   <Widget title="시간표" right={<span className="text-[11px] font-semibold text-gray-400">빈 칸 클릭해 추가 · 블록 클릭해 수정</span>}>
    <div className="grid gap-1 mb-1" style={{gridTemplateColumns:"28px repeat(5,1fr)"}}><div/>{DAYS.map(d=><div key={d} className="text-[11px] font-semibold text-gray-500 text-center">{d}</div>)}</div>
    <div className="grid gap-1" style={{gridTemplateColumns:"28px repeat(5,1fr)"}}>
      <div className="flex flex-col">{Array.from({length:rows}).map((_,i)=><div key={i} className="h-9 text-[9px] text-gray-300 text-right pr-1 leading-9">{H0+i}</div>)}</div>
      {DAYS.map((_,d)=>(
        <div key={d} className="relative">
          {Array.from({length:rows}).map((_,i)=><button key={i} onClick={()=>setEdit({isNew:true,block:{id:"",subject:"",room:"",day:d,start:H0+i,end:H0+i+1,color:"indigo"}})} className="block w-full h-9 border-t border-gray-100 hover:bg-indigo-50/40"/>)}
          {cs.filter(c=>c.day===d).map(c=>{const t=TONE[c.color];return(
            <button key={c.id} onClick={()=>setEdit({isNew:false,block:{...c}})} className={"absolute left-0 right-0 rounded-lg px-1.5 py-1 text-left overflow-hidden ring-1 "+t[0]+" "+t[2]} style={{top:(c.start-H0)*36,height:(c.end-c.start)*36-2}}>
              <p className={"text-[10px] font-semibold leading-tight "+t[1]}>{c.subject}</p>{c.room&&<p className="text-[9px] text-gray-400 truncate">{c.room}</p>}
            </button>);})}
        </div>
      ))}
    </div>
    {edit&&<Modal edit={edit} setEdit={setEdit} save={save} del={del}/>}
   </Widget>
  );
}
function Modal({edit,setEdit,save,del}){
  const b=edit.block, set=(p)=>setEdit({...edit,block:{...b,...p}});
  return (
   <div className="fixed inset-0 bg-black/30 flex items-center justify-center z-50" onClick={()=>setEdit(null)}>
    <div className="bg-white rounded-xl p-5 w-72 shadow-xl" onClick={e=>e.stopPropagation()}>
      <h4 className="text-sm font-bold text-gray-800 mb-3">{edit.isNew?"강의 추가":"강의 수정"}</h4>
      <div className="space-y-2.5">
        <input autoFocus className="w-full border border-gray-200 rounded-lg px-3 py-2 text-[13px]" placeholder="과목명" value={b.subject} onChange={e=>set({subject:e.target.value})}/>
        <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-[13px]" placeholder="강의실 (선택)" value={b.room} onChange={e=>set({room:e.target.value})}/>
        <div className="flex gap-2">
          <select className="flex-1 border border-gray-200 rounded-lg px-2 py-2 text-[13px]" value={b.day} onChange={e=>set({day:+e.target.value})}>{DAYS.map((d,i)=><option key={d} value={i}>{d}요일</option>)}</select>
          <select className="flex-1 border border-gray-200 rounded-lg px-2 py-2 text-[13px]" value={b.start} onChange={e=>{const s=+e.target.value;set({start:s,end:Math.max(b.end,s+1)});}}>{Array.from({length:H1-H0}).map((_,i)=><option key={i} value={H0+i}>{H0+i}시</option>)}</select>
          <select className="flex-1 border border-gray-200 rounded-lg px-2 py-2 text-[13px]" value={b.end} onChange={e=>set({end:+e.target.value})}>{Array.from({length:H1-H0}).map((_,i)=>H0+1+i).filter(h=>h>b.start).map(h=><option key={h} value={h}>{h}시</option>)}</select>
        </div>
        <div className="flex gap-2 pt-1">{Object.keys(TONE).map(c=><button key={c} onClick={()=>set({color:c})} className={"w-7 h-7 rounded-full "+TONE[c][0]+" "+TONE[c][1]+(b.color===c?" ring-2 ring-offset-1 ring-gray-400":"")}>●</button>)}</div>
      </div>
      <div className="flex justify-between mt-4">{!edit.isNew?<button onClick={del} className="text-[13px] text-red-500 font-medium">삭제</button>:<span/>}
        <div className="flex gap-2"><button onClick={()=>setEdit(null)} className="text-[13px] text-gray-500 px-3 py-1.5">취소</button><button onClick={save} className="text-[13px] bg-indigo-600 text-white rounded-lg px-4 py-1.5 font-medium">저장</button></div></div>
    </div>
   </div>
  );
}

/* ===== 투표 (인터랙티브) ===== */
const SEED_POLL={id:"festival-2026",title:"축제 초청 가수 투표",owner:"학생회",total:32,deadline:"2026-06-29",options:[{id:"o1",label:"데이식스",votes:9},{id:"o2",label:"아이브",votes:5},{id:"o3",label:"잔나비",votes:3}]};
const tv=(p)=>p.options.reduce((s,o)=>s+o.votes,0);
const pct=(p,id)=>{const t=tv(p);if(!t)return 0;const v=p.options.find(o=>o.id===id)?.votes??0;return Math.round(v/t*100);};
const closed=(p)=>new Date(p.deadline)<new Date(new Date().toDateString());
const dday=(p)=>Math.ceil((new Date(p.deadline)-new Date(new Date().toDateString()))/86400000);
function Poll(){
  const [poll,setPoll]=useState(()=>LS.get('poll.'+SEED_POLL.id,SEED_POLL));
  const [sel,setSel]=useState(null);
  const voted=!!poll.votedOptionId, isC=closed(poll), result=voted||isC;
  const submit=()=>{if(!sel||voted||isC)return;const n={...poll,votedOptionId:sel,options:poll.options.map(o=>o.id===sel?{...o,votes:o.votes+1}:o)};setPoll(n);LS.set('poll.'+n.id,n);};
  return (
   <Widget title={poll.title} dot="amber" right={<span className="text-[10px] font-bold text-amber-600 bg-amber-50 rounded-full px-2.5 py-1">{poll.owner}</span>}>
    <div className="space-y-2">
      {poll.options.map(o=>{const p=pct(poll,o.id),mine=poll.votedOptionId===o.id;
        return result?(
          <div key={o.id}>
            <div className="flex justify-between text-[11px] mb-1"><span className={mine?"font-bold text-amber-600":"text-gray-900"}>{o.label}{mine&&" ✓"}</span><span className="font-bold text-gray-500">{p}%</span></div>
            <div className="h-2 rounded-full bg-gray-100 overflow-hidden"><div className={mine?"h-full bg-amber-500":"h-full bg-amber-300"} style={{width:p+"%"}}/></div>
          </div>
        ):(
          <button key={o.id} onClick={()=>setSel(o.id)} className={"w-full flex items-center gap-2.5 rounded-lg border px-3 py-2.5 text-left "+(sel===o.id?"border-amber-400 bg-amber-50":"border-gray-200 hover:bg-gray-50")}>
            <span className={"w-4 h-4 rounded-full border-2 grid place-items-center "+(sel===o.id?"border-amber-500":"border-gray-300")}>{sel===o.id&&<span className="w-2 h-2 rounded-full bg-amber-500"/>}</span>
            <span className="text-[13px] text-gray-900">{o.label}</span>
          </button>
        );})}
    </div>
    <footer className="mt-3 flex items-center justify-between">
      <p className="text-[11px] text-gray-400">{poll.total}명 중 {tv(poll)}명 참여 · {isC?"마감됨":"마감 D-"+dday(poll)}</p>
      {!result&&<button onClick={submit} disabled={!sel} className="text-[12px] bg-amber-500 disabled:bg-gray-200 disabled:text-gray-400 text-white rounded-lg px-4 py-1.5 font-medium">투표하기</button>}
      {voted&&<span className="text-[11px] font-semibold text-amber-600">투표 완료 ✓</span>}
    </footer>
   </Widget>
  );
}

/* ===== 정적 위젯 ===== */
const KEYWORDS=["장학","IT교육","인턴","채용"];
const NOTICE_FB={notices:[
  {title:"(재)3.1문화재단 장학생 모집 안내",author:"학생과",date:"2026/06/26",url:"#",is_new:true},
  {title:"[IT교육센터]2026년 IT역량강화 비교과 프로그램 개설",author:"IT교육센터",date:"2026/06/26",url:"#",is_new:true},
]};
const Notices=()=>{
  const data=useJson("./data/notices.json",NOTICE_FB);
  const all=data.notices||[];
  const shown=all.filter(n=>KEYWORDS.some(k=>n.title.includes(k)));
  const list=(shown.length?shown:all).slice(0,4);
  const when=data.scraped_at?data.scraped_at.slice(5,10).replace("-","/"):null;
  return (
   <Widget title="학교 공지" right={<span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 rounded-full px-2.5 py-1">필터 ON</span>}>
    <div className="flex flex-wrap gap-2 mb-3">{KEYWORDS.map(k=><span key={k} className="text-[11px] text-gray-600 bg-gray-100 rounded-full px-3 py-1">{k}</span>)}</div>
    <ul className="divide-y divide-gray-100">{list.map((n,i)=>(
      <li key={i} className="py-2.5"><a href={n.url||"#"} target="_blank" className="block group"><p className="flex items-center gap-1.5 text-[13px] font-semibold text-gray-900 group-hover:text-indigo-600 truncate"><span className={"w-1.5 h-1.5 rounded-full shrink-0 "+(n.is_new?"bg-red-500":"bg-indigo-600")}/>{n.title}</p><p className="text-[11px] text-gray-400 mt-0.5 pl-3">{n.author} · {(n.date||"").slice(5)}{n.is_new&&" · 신규"}</p></a></li>
    ))}</ul>
    <p className="text-[10px] text-gray-400 mt-2">※ 경북대 공지 실시간 수집{when?` · ${when} 갱신`:""} (GitHub Actions 자동)</p>
   </Widget>
  );
};
const MEAL_FB={day:"월",meals:[{meal:"중식",items:[{name:"제육볶음 정식",price:5000,time:"11:00~13:30"}]}]};
const Meal=()=>{
  const data=useJson("./data/meal.json",MEAL_FB);
  const lunch=(data.meals||[]).find(m=>m.meal==="중식")||data.meals?.[0];
  const dinner=(data.meals||[]).find(m=>m.meal==="석식");
  const main=lunch?.items?.[0];
  const sub=lunch?.items?.slice(1,4).map(i=>i.name).join(" · ");
  return (
   <Widget title="오늘 학식" dot="green" right={<span className="text-[11px] font-semibold text-gray-400">제1학생회관 · {data.day}요일</span>}>
    <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 rounded-full px-2.5 py-1">{lunch?.meal||"중식"}</span>
    <div className="flex items-baseline justify-between mt-3"><p className="text-[13px] font-semibold text-gray-900 truncate pr-2">{main?.name||"메뉴 준비중"}</p>{main?.price&&<p className="text-[13px] font-bold text-green-600 shrink-0">{main.price.toLocaleString()}원</p>}</div>
    {sub&&<p className="text-[11px] text-gray-500 mt-1 truncate">{sub}</p>}
    {dinner?.items?.[0]&&<div className="border-t border-gray-100 mt-3 pt-2.5 flex items-center justify-between"><p className="text-[11px] text-gray-400 truncate pr-2">석식 · {dinner.items[0].name}</p><p className="text-[11px] text-gray-300 shrink-0">{dinner.items[0].time||"17:00~"}</p></div>}
   </Widget>
  );
};
const Posts=()=>{
  const posts=[["공지","기말 강의평가 기간 안내 (~6/30)","학생회","2시간 전"],["행사","종강총회 + MT 수요조사","과대표","5시간 전"],["자료","알고리즘 중간 족보 모음.zip","익명","어제"]];
  const tag={공지:"bg-red-50 text-red-500",행사:"bg-green-50 text-green-600",자료:"bg-gray-100 text-gray-500"};
  return (
   <Widget title="컴퓨터공학과 게시판" right={<span className="text-[11px] font-semibold text-indigo-600">전체보기</span>}>
    <ul className="divide-y divide-gray-100">{posts.map((p,i)=>(<li key={i} className="py-2.5 flex items-center gap-3"><span className={"text-[10px] font-bold rounded-md px-2 py-1 shrink-0 "+tag[p[0]]}>{p[0]}</span><span className="text-[13px] font-semibold text-gray-900 flex-1 truncate">{p[1]}</span><span className="text-[11px] text-gray-400 shrink-0">{p[2]} · {p[3]}</span></li>))}</ul>
   </Widget>
  );
};

const Sidebar=()=>{
  const orgs=[["개인","bg-slate-400",false,null],["컴퓨터공학과","bg-indigo-600",true,32],["블로우파이프 동아리","bg-red-500",false,null],["캡스톤 디자인 4조","bg-green-600",false,null]];
  return (
   <aside className="w-56 bg-white border-r border-gray-200 flex-col shrink-0 hidden md:flex">
    <div className="flex items-center gap-2.5 px-6 py-6"><div className="w-6 h-6 rounded-lg bg-indigo-600"/><span className="font-bold text-gray-900">캠퍼스 보드</span></div>
    <nav className="px-3 flex-1">
      <p className="text-[11px] font-semibold text-gray-400 px-3 mb-2">내 소속</p>
      {orgs.map(([n,c,a,b])=>(<button key={n} className={"w-full flex items-center gap-3 rounded-lg px-3 py-2.5 mb-0.5 "+(a?"bg-indigo-50":"hover:bg-gray-50")}><span className={"w-2 h-2 rounded-full "+c}/><span className={"text-[13px] flex-1 text-left "+(a?"font-bold text-indigo-600":"font-medium text-gray-600")}>{n}</span>{b&&<span className="text-[10px] font-semibold text-white bg-indigo-600 rounded-full px-2 py-0.5">{b}</span>}</button>))}
    </nav>
    <div className="flex items-center gap-2.5 px-5 py-5 border-t border-gray-100"><div className="w-8 h-8 rounded-full bg-indigo-600 grid place-items-center text-white text-[13px] font-bold">춘</div><div><p className="text-[13px] font-semibold text-gray-900">춘배</p><p className="text-[11px] text-gray-400">설정 · 로그아웃</p></div></div>
   </aside>
  );
};

function App(){
  const today=useMemo(()=>new Date().toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"long"}),[]);
  const reset=()=>{localStorage.removeItem('campus.timetable');localStorage.removeItem('campus.poll.festival-2026');location.reload();};
  return (
   <div className="flex min-h-screen">
    <Sidebar/>
    <main className="flex-1 p-6 md:p-8 overflow-auto">
      <div className="flex items-start justify-between mb-6">
        <div><h1 className="text-2xl font-bold text-gray-900">좋은 아침, 춘배</h1><p className="text-[13px] text-gray-500 mt-1">{today} · 컴퓨터공학과 보드</p></div>
        <button onClick={reset} className="text-[12px] text-gray-500 border border-gray-300 rounded-lg px-3 py-1.5 shrink-0">데모 초기화</button>
      </div>
      <div className="grid lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2"><Timetable/></div>
        <Poll/>
        <Notices/><Meal/>
        <div className="lg:col-span-2"><Posts/></div>
      </div>
      <div className="mt-5 bg-[#1A1D26] rounded-2xl min-h-[48px] flex items-center justify-between px-5 shadow-lg py-2">
        <p className="text-[13px] text-gray-400">✦ 시간표 빈 칸을 클릭하고, 투표에 참여해 보세요 — 변경사항은 브라우저에 저장됩니다</p>
      </div>
    </main>
   </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
